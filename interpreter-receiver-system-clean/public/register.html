<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Receiver Pre-registration</title>
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body>
  <header class="site-header">
    <div class="narrow">
      <a class="brand" href="/">
        <span class="brand-mark">IR</span>
        <span>Interpreter Receiver</span>
      </a>
    </div>
  </header>

  <main class="narrow">
    <section class="page-head">
      <h1 class="page-title" data-i18n="title">Receiver pre-registration</h1>
      <p class="muted" data-i18n="subtitle">Register in advance and show your QR code at the rental desk.</p>
    </section>

    <div id="page-message" class="notice hidden"></div>

    <section class="card">
      <div id="event-strip" class="event-strip">
        <div>
          <strong id="event-name">Loading event...</strong>
          <span id="event-location" class="small muted"></span>
        </div>
        <div id="event-date" class="small"></div>
      </div>

      <form id="registration-form" class="form-grid">
        <div class="field">
          <label for="ui-language" data-i18n="displayLanguage">Display language</label>
          <select class="select" id="ui-language" disabled>
            <option value="en">English</option>
          </select>
        </div>

        <div class="form-grid two">
          <div class="field">
            <label class="required" for="member-no" data-i18n="memberNo">8-digit member number</label>
            <input class="input" id="member-no" name="member_no" inputmode="numeric" pattern="[0-9]{8}" maxlength="8" autocomplete="off" required>
          </div>
          <div class="field">
            <label class="required" for="full-name" data-i18n="fullName">Full name</label>
            <input class="input" id="full-name" name="full_name" maxlength="120" autocomplete="name" required>
          </div>
        </div>

        <div class="form-grid two">
          <div class="field">
            <label for="email" data-i18n="email">Email</label>
            <input class="input" id="email" name="email" type="email" maxlength="200" autocomplete="email">
          </div>
          <div class="field">
            <label for="phone" data-i18n="phone">Phone number</label>
            <input class="input" id="phone" name="phone" type="tel" maxlength="50" autocomplete="tel">
          </div>
        </div>

        <div class="field">
          <label class="required" for="language" data-i18n="interpretationLanguage">Interpretation language</label>
          <select class="select" id="language" name="language" required>
            <option value="" data-i18n="selectLanguage">Select a language</option>
            <option>English</option>
            <option>German</option>
            <option>Russian</option>
            <option>Romanian</option>
            <option>Spanish</option>
            <option>Turkish</option>
            <option>Italian</option>
            <option>French</option>
            <option>Korean</option>
            <option>Other</option>
          </select>
        </div>

        <label class="checkbox">
          <input id="consent" type="checkbox" required>
          <span data-i18n="consent">I agree to return the receiver after the event. I understand that loss or damage may be recorded and may result in a charge.</span>
        </label>

        <button class="button full" id="submit-button" type="submit" data-i18n="submit">Create my QR ticket</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="narrow">Please keep your QR ticket ready at the interpretation desk.</div>
  </footer>

  <script type="module" src="/assets/js/register.js"></script>
</body>
</html>
